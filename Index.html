<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIM Chat - Windows XP Style</title>
  <style>
    /* Stile di base per la pagina */
    body {
      background-color: #3c3c3c;
      font-family: 'Tahoma', sans-serif;
      color: #ffffff;
      margin: 0;
      padding: 0;
    }

    /* Finestra principale in stile Windows XP */
    #box {
      width: 350px;
      margin: 50px auto;
      background: linear-gradient(#80bfff, #99ccff);
      border: 2px solid #0066cc;
      border-radius: 5px;
      box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.4);
    }

    .header {
      background-color: #0066cc;
      padding: 10px;
      color: white;
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      border-top-left-radius: 5px;
      border-top-right-radius: 5px;
    }

    #messages {
      height: 200px;
      overflow-y: auto;
      padding: 10px;
      background-color: #f3f3f3;
      color: #333;
      font-size: 14px;
      border-bottom: 2px solid #0066cc;
    }

    /* Stile per il nickname */
    #login {
      text-align: center;
      margin-top: 50px;
    }

    #name {
      padding: 10px;
      margin-top: 10px;
      width: 250px;
      border: 1px solid #0066cc;
      border-radius: 5px;
      background-color: #e6f2ff;
      color: #333;
    }

    /* Bottone di login */
    button {
      background-color: #0066cc;
      color: white;
      border: 1px solid #005bb5;
      border-radius: 5px;
      padding: 10px;
      margin-top: 10px;
      width: 260px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background-color: #005bb5;
    }

    /* Input del messaggio */
    #msg {
      padding: 10px;
      margin-top: 10px;
      width: 80%;
      border: 1px solid #0066cc;
      border-radius: 5px;
      background-color: #e6f2ff;
      color: #333;
      font-size: 14px;
    }

    /* Finestra del messaggio */
    .message-box {
      margin-top: 5px;
      padding: 5px;
      background-color: #f1f1f1;
      border-radius: 5px;
      margin-bottom: 5px;
    }

    .message-user {
      font-weight: bold;
      color: #0066cc;
    }
  </style>
</head>
<body>

  <!-- Finestra di login -->
  <div id="login">
    <input id="name" placeholder="Inserisci il tuo nickname" />
    <button onclick="start()">Entra</button>
  </div>

  <!-- Finestra chat -->
  <div id="box" style="display:none;">
    <div class="header">Chat AIM</div>
    <div id="messages"></div>
    <input id="msg" placeholder="Scrivi il tuo messaggio..." />
  </div>

  <script type="module">
    // Import Firebase SDK
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // La tua configurazione Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCqxtSjXlFg4uqRTZCR8ypLyTBlvyZRALY",
      authDomain: "aim-chat-f8a79.firebaseapp.com",
      projectId: "aim-chat-f8a79",
      storageBucket: "aim-chat-f8a79.firebasestorage.app",
      messagingSenderId: "717980811300",
      appId: "1:717980811300:web:e205dd43747dc1a22e18b1"
    };

    // Inizializza Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let user = "";

    // Funzione per avviare la chat
    window.start = function() {
      user = document.getElementById("name").value;
      if (!user) return;

      document.getElementById("login").style.display = "none";
      document.getElementById("box").style.display = "block";

      load();
    };

    // Funzione per caricare i messaggi in tempo reale
    function load() {
      const q = query(collection(db, "messages"), orderBy("time"));

      onSnapshot(q, (snap) => {
        const box = document.getElementById("messages");
        box.innerHTML = "";

        snap.forEach(doc => {
          let m = doc.data();
          box.innerHTML += `
            <div class="message-box">
              <div class="message-user">${m.user}:</div>
              <div>${m.text}</div>
            </div>
          `;
        });

        box.scrollTop = box.scrollHeight;
      });
    }

    // Funzione per inviare un messaggio
    document.getElementById("msg").addEventListener("keypress", async (e) => {
      if (e.key === "Enter") {
        await addDoc(collection(db, "messages"), {
          user: user,
          text: e.target.value,
          time: Date.now()
        });
        e.target.value = "";
      }
    });
  </script>

</body>
</html>
